<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing - WhatsApp & Make.com 整合測試</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .container { max-width: 500px; width: 100%; margin: 20px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        input { -webkit-appearance: none; appearance: none; }
        input[type="tel"], input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn {
            width: 100%;
            padding: 14px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .btn:active { transform: scale(0.98); }
        .btn-whatsapp { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); }
        .btn-make { background: linear-gradient(135deg, #ff4b2b 0%, #ff416c 100%); }
        .status { margin-top: 16px; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; font-weight: bold; }
        .status.success { background: #d1fae5; color: #065f46; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .info-box { background: #f0f9ff; border-left: 4px solid #0284c7; padding: 12px; border-radius: 6px; margin-top: 16px; font-size: 13px; color: #0c4a6e; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-2xl font-bold mb-2 text-center text-gray-800">🛠️ 自動化測試工具</h1>
        <p class="text-center text-gray-600 mb-6 text-sm">測試 WhatsApp 跳轉與 Make.com Webhook</p>

        <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-700">測試姓名</label>
            <input type="text" id="nameInput" placeholder="例如: Vincent">
            
            <label class="block text-sm font-bold text-gray-700">測試電話</label>
            <input type="tel" id="phoneInput" placeholder="例如: 98765432">
            
            <div class="grid grid-cols-1 gap-3 mt-4">
                <button class="btn btn-whatsapp" onclick="sendWhatsApp()">
                    📱 測試 WhatsApp 跳轉 (手動)
                </button>
                
                <button class="btn btn-make" onclick="sendToMake()">
                    ⚡ 測試 Make.com Webhook (自動)
                </button>
            </div>
            
            <div id="status" class="hidden status"></div>

            <div class="info-box">
                <strong>💡 測試說明：</strong><br>
                1. <strong>WhatsApp 測試</strong>：會打開 App 並預填訊息，需手動點擊傳送。<br>
                2. <strong>Make.com 測試</strong>：會直接將資料傳送到您的 Webhook。請先在 Make 點擊 <strong>"Run once"</strong> 來捕捉資料。
            </div>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-200">
            <p class="text-center text-xs text-gray-500">
                <a href="./" class="text-blue-600 hover:underline">← 返回問卷</a> | 
                <a href="./admin.html" class="text-blue-600 hover:underline">查看名單 →</a>
            </p>
        </div>
    </div>

    <script>
        const MAKE_WEBHOOK_URL = 'https://hook.eu1.make.com/wnk38c6ufkt10ckkzbrlvgfjmzeg72jr';

        function formatPhoneNumber(phone) {
            let cleaned = phone.replace(/[^\d+]/g, '');
            if (!cleaned.startsWith('+')) {
                if (cleaned.startsWith('0')) cleaned = cleaned.substring(1);
                cleaned = '+852' + cleaned;
            }
            return cleaned;
        }

        function sendWhatsApp() {
            const phoneInput = document.getElementById('phoneInput').value.trim();
            if (!phoneInput) { alert('請輸入電話'); return; }
            const phone = formatPhoneNumber(phoneInput);
            const message = encodeURIComponent('感謝您蒞臨我們的 AI EVENT 活動！');
            const whatsappURL = `https://wa.me/${phone.replace('+', '')}?text=${message}`;
            window.open(whatsappURL, '_blank');
        }

        async function sendToMake() {
            const name = document.getElementById('nameInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!name || !phone) {
                alert('請填寫姓名與電話');
                return;
            }

            statusDiv.innerText = '⏳ 正在發送至 Make.com...';
            statusDiv.className = 'status success';
            statusDiv.classList.remove('hidden');

            try {
                const response = await fetch(MAKE_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        test_name: name,
                        test_phone: phone,
                        timestamp: new Date().toISOString(),
                        source: 'Testing Page'
                    })
                });

                if (response.ok) {
                    statusDiv.innerText = '✅ 發送成功！請檢查 Make.com 是否收到資料。';
                } else {
                    throw new Error('伺服器返回錯誤');
                }
            } catch (err) {
                statusDiv.innerText = '❌ 發送失敗: ' + err.message;
                statusDiv.className = 'status error';
            }
        }
    </script>
</body>
</html>
