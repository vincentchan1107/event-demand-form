<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶需求調查問卷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; }
        .form-container { max-width: 500px; margin: 20px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4">
    <div class="form-container">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Event 客戶需求登記</h1>
        <form id="demandForm" onsubmit="handleSubmit(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">客戶公司</label>
                <input type="text" id="company" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入公司名稱">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">客戶名稱</label>
                <input type="text" id="customer_name" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入您的姓名">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">聯絡電話</label>
                <input type="tel" id="phone" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入聯絡電話">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">對什麼有興趣 (可多選)</label>
                <div class="space-y-2">
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
                        <input type="checkbox" name="interests" value="AI prompt 指令" class="w-5 h-5 text-blue-600">
                        <span class="ml-3 text-gray-700">AI prompt 指令</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
                        <input type="checkbox" name="interests" value="AI 剪片" class="w-5 h-5 text-blue-600">
                        <span class="ml-3 text-gray-700">AI 剪片</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
                        <input type="checkbox" name="interests" value="AI AGENT" class="w-5 h-5 text-blue-600">
                        <span class="ml-3 text-gray-700">AI AGENT</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
                        <input type="checkbox" name="interests" value="AI 文件管理" class="w-5 h-5 text-blue-600">
                        <span class="ml-3 text-gray-700">AI 文件管理</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
                        <input type="checkbox" name="interests" value="AI 工作流程管理" class="w-5 h-5 text-blue-600">
                        <span class="ml-3 text-gray-700">AI 工作流程管理</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">想約 DEMO 日期</label>
                <input type="date" id="demo_date" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200 mt-6">
                提交需求
            </button>
        </form>
        
        <p id="message" class="mt-4 text-center text-sm hidden"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://hazxfinkokifujqlmkcs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhenhmaW5rb2tpZnVqcWxta2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ2MzcsImV4cCI6MjA5MjM2MDYzN30.y3njujhhcoZW5WTirqkGvWbv962e4F2whVVP0VeQ6ic';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            
            // 禁用按鈕防止重複點擊
            btn.disabled = true;
            btn.innerText = '正在提交...';
            msg.classList.add('hidden');

            try {
                // 獲取興趣項目
                const interests = Array.from(document.querySelectorAll('input[name="interests"]:checked')).map(el => el.value);
                
                const payload = {
                    company_name: document.getElementById('company').value,
                    customer_name: document.getElementById('customer_name').value,
                    phone_number: document.getElementById('phone').value,
                    interests: interests,
                    demo_date: document.getElementById('demo_date').value
                };

                console.log("正在提交數據:", payload);

                const { data, error } = await supabase
                    .from('customer_demands')
                    .insert([payload]);

                if (error) throw error;

                // 成功處理
                msg.innerText = '✓ 感謝提交！您的需求已成功記錄。';
                msg.className = 'mt-4 text-center text-sm text-green-600 font-bold';
                msg.classList.remove('hidden');
                document.getElementById('demandForm').reset();
                
            } catch (err) {
                console.error("提交錯誤:", err);
                msg.innerText = '❌ 提交失敗: ' + (err.message || '請檢查網路或稍後再試');
                msg.className = 'mt-4 text-center text-sm text-red-600 font-bold';
                msg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = '提交需求';
            }
        }
    </script>
</body>
</html>
