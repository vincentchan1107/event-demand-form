<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶需求調查問卷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Event 客戶需求登記</h1>
        
        <div class="space-y-4">
            <input type="text" id="c_company" class="w-full p-3 border rounded" placeholder="客戶公司 (必填)">
            <input type="text" id="c_name" class="w-full p-3 border rounded" placeholder="客戶名稱 (必填)">
            <input type="tel" id="c_phone" class="w-full p-3 border rounded" placeholder="聯絡電話 (必填)">
            
            <div class="p-3 bg-gray-50 rounded">
                <p class="text-sm font-bold mb-2">對什麼有興趣 (多選):</p>
                <label class="block"><input type="checkbox" name="int" value="AI prompt 指令"> AI prompt 指令</label>
                <label class="block"><input type="checkbox" name="int" value="AI 剪片"> AI 剪片</label>
                <label class="block"><input type="checkbox" name="int" value="AI AGENT"> AI AGENT</label>
                <label class="block"><input type="checkbox" name="int" value="AI 文件管理"> AI 文件管理</label>
                <label class="block"><input type="checkbox" name="int" value="AI 工作流程管理"> AI 工作流程管理</label>
            </div>

            <p class="text-sm font-bold">想約 DEMO 日期:</p>
            <input type="date" id="c_date" class="w-full p-3 border rounded">

            <button id="mainBtn" onclick="doSubmit()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg shadow-lg active:bg-blue-800">
                確認提交
            </button>
        </div>
        <p id="msg" class="mt-4 text-center text-red-600 font-bold"></p>
    </div>

    <script>
        console.log("頁面腳本已載入");
        
        const S_URL = 'https://hazxfinkokifujqlmkcs.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhenhmaW5rb2tpZnVqcWxta2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ2MzcsImV4cCI6MjA5MjM2MDYzN30.y3njujhhcoZW5WTirqkGvWbv962e4F2whVVP0VeQ6ic';
        
        let sb;
        try {
            sb = window.supabase.createClient(S_URL, S_KEY);
            console.log("Supabase 初始化成功");
        } catch(e) {
            alert("初始化失敗: " + e.message);
        }

        async function doSubmit() {
            const btn = document.getElementById('mainBtn');
            const msg = document.getElementById('msg');
            
            // 獲取數據
            const company = document.getElementById('c_company').value;
            const name = document.getElementById('c_name').value;
            const phone = document.getElementById('c_phone').value;
            const date = document.getElementById('c_date').value;
            const ints = Array.from(document.querySelectorAll('input[name="int"]:checked')).map(el => el.value);

            if(!company || !name || !phone || !date) {
                alert("請填寫完整資料！");
                return;
            }

            btn.disabled = true;
            btn.innerText = "提交中...";
            msg.innerText = "";

            try {
                const { error } = await sb.from('customer_demands').insert([{
                    company_name: company,
                    customer_name: name,
                    phone_number: phone,
                    interests: ints,
                    demo_date: date
                }]);

                if(error) throw error;

                alert("✅ 提交成功！");
                window.location.reload();
            } catch(e) {
                alert("❌ 提交出錯: " + e.message);
                msg.innerText = "錯誤: " + e.message;
                btn.disabled = false;
                btn.innerText = "確認提交";
            }
        }
    </script>
</body>
</html>
