<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶需求調查問卷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #f3f4f6;
        }
        .form-container {
            max-width: 500px;
            margin: 20px auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="p-4">
    <div class="form-container">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Event 客戶需求登記</h1>
        <form id="demandForm" class="space-y-4">
            <!-- 客戶基本資料 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">客戶公司</label>
                <input type="text" name="company" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入公司名稱">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">客戶名稱</label>
                <input type="text" name="customer_name" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入您的姓名">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">聯絡電話</label>
                <input type="tel" name="phone" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入聯絡電話">
            </div>

            <!-- 有興趣的項目 (多選) -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">對什麼有興趣 (可多選)</label>
                <div class="space-y-2">
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition">
                        <input type="checkbox" name="interests" value="AI prompt 指令" class="w-5 h-5 text-blue-600 border-gray-300 rounded">
                        <span class="ml-3 text-gray-700">AI prompt 指令</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition">
                        <input type="checkbox" name="interests" value="AI 剪片" class="w-5 h-5 text-blue-600 border-gray-300 rounded">
                        <span class="ml-3 text-gray-700">AI 剪片</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition">
                        <input type="checkbox" name="interests" value="AI AGENT" class="w-5 h-5 text-blue-600 border-gray-300 rounded">
                        <span class="ml-3 text-gray-700">AI AGENT</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition">
                        <input type="checkbox" name="interests" value="AI 文件管理" class="w-5 h-5 text-blue-600 border-gray-300 rounded">
                        <span class="ml-3 text-gray-700">AI 文件管理</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition">
                        <input type="checkbox" name="interests" value="AI 工作流程管理" class="w-5 h-5 text-blue-600 border-gray-300 rounded">
                        <span class="ml-3 text-gray-700">AI 工作流程管理</span>
                    </label>
                </div>
            </div>

            <!-- DEMO 日期 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">想約 DEMO 日期</label>
                <input type="date" name="demo_date" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- 提交按鈕 -->
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200 mt-6">
                提交需求
            </button>
        </form>
        
        <p id="message" class="mt-4 text-center text-sm hidden"></p>
    </div>

    <script>
        // ===== Supabase 配置 =====
        // 請將以下值替換為您的 Supabase 項目資訊
        const SUPABASE_URL = 'https://hazxfinkokifujqlmkcs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhenhmaW5rb2tpZnVqcWxta2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ2MzcsImV4cCI6MjA5MjM2MDYzN30.y3njujhhcoZW5WTirqkGvWbv962e4F2whVVP0VeQ6ic';

        // 初始化 Supabase 客戶端
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== 表單提交事件 =====
        document.getElementById('demandForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const messageEl = document.getElementById('message');
            
            try {
                const formData = new FormData(this);
                const interests = formData.getAll('interests');

                // 準備要插入的數據
                const data = {
                    company_name: formData.get('company'),
                    customer_name: formData.get('customer_name'),
                    phone_number: formData.get('phone'),
                    interests: interests, // Supabase 會自動轉換為 TEXT[]
                    demo_date: formData.get('demo_date')
                };

                // 插入數據到 Supabase
                const { data: insertedData, error } = await supabase
                    .from('customer_demands')
                    .insert([data]);

                if (error) {
                    throw error;
                }

                // 成功提交
                messageEl.textContent = '✓ 感謝提交！您的需求已成功記錄。';
                messageEl.classList.remove('hidden', 'text-red-500');
                messageEl.classList.add('text-green-600');
                
                console.log('提交成功:', insertedData);
                this.reset();

            } catch (error) {
                // 錯誤處理
                console.error('提交失敗:', error);
                messageEl.textContent = `✗ 提交失敗: ${error.message || '請檢查您的網絡連接或 Supabase 配置。'}`;
                messageEl.classList.remove('hidden', 'text-green-600');
                messageEl.classList.add('text-red-500');
            }
        });
    </script>
</body>
</html>
