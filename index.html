<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶需求調查問卷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .form-container { max-width: 500px; margin: 20px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        input[type="checkbox"] { width: 1.5rem; height: 1.5rem; }
    </style>
</head>
<body class="p-4">
    <div class="form-container">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Event 客戶需求登記</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">客戶公司</label>
                <input type="text" id="company" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="輸入公司名稱">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">客戶名稱</label>
                <input type="text" id="customer_name" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="輸入您的姓名">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">聯絡電話</label>
                <input type="tel" id="phone" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="輸入聯絡電話">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">對什麼有興趣 (可多選)</label>
                <div class="space-y-2" id="interestsGroup">
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg">
                        <input type="checkbox" value="AI prompt 指令" class="interest-check">
                        <span class="ml-3 text-gray-700">AI prompt 指令</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg">
                        <input type="checkbox" value="AI 剪片" class="interest-check">
                        <span class="ml-3 text-gray-700">AI 剪片</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg">
                        <input type="checkbox" value="AI AGENT" class="interest-check">
                        <span class="ml-3 text-gray-700">AI AGENT</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg">
                        <input type="checkbox" value="AI 文件管理" class="interest-check">
                        <span class="ml-3 text-gray-700">AI 文件管理</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg">
                        <input type="checkbox" value="AI 工作流程管理" class="interest-check">
                        <span class="ml-3 text-gray-700">AI 工作流程管理</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">想約 DEMO 日期</label>
                <input type="date" id="demo_date" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="button" id="submitBtn" onclick="sendData()" class="w-full bg-blue-600 text-white font-bold py-4 px-4 rounded-lg hover:bg-blue-700 transition duration-200 mt-6 shadow-lg">
                確認提交
            </button>
        </div>
        
        <p id="statusMsg" class="mt-4 text-center text-sm font-bold hidden"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://hazxfinkokifujqlmkcs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhenhmaW5rb2tpZnVqcWxta2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ2MzcsImV4cCI6MjA5MjM2MDYzN30.y3njujhhcoZW5WTirqkGvWbv962e4F2whVVP0VeQ6ic';
        
        // 確保 SDK 載入
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) {
            alert("Supabase SDK 載入失敗，請檢查網路連線");
        }

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');
            
            // 獲取數值
            const company = document.getElementById('company').value;
            const name = document.getElementById('customer_name').value;
            const phone = document.getElementById('phone').value;
            const date = document.getElementById('demo_date').value;
            
            if(!company || !name || !phone || !date) {
                alert("請填寫所有必填欄位！");
                return;
            }

            const interests = Array.from(document.querySelectorAll('.interest-check:checked')).map(el => el.value);

            // UI 狀態更新
            btn.disabled = true;
            btn.innerText = '正在處理中...';
            status.innerText = '正在連接資料庫...';
            status.className = 'mt-4 text-center text-sm font-bold text-blue-600';
            status.classList.remove('hidden');

            try {
                const { data, error } = await supabase
                    .from('customer_demands')
                    .insert([{
                        company_name: company,
                        customer_name: name,
                        phone_number: phone,
                        interests: interests,
                        demo_date: date
                    }]);

                if (error) throw error;

                alert("✅ 提交成功！感謝您的參與。");
                location.reload(); // 成功後重整頁面

            } catch (err) {
                console.error(err);
                alert("❌ 提交失敗\n原因: " + err.message);
                status.innerText = '提交失敗，請查看彈窗提示';
                status.className = 'mt-4 text-center text-sm font-bold text-red-600';
            } finally {
                btn.disabled = false;
                btn.innerText = '確認提交';
            }
        }
    </script>
</body>
</html>
