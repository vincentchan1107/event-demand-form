<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI EVENT 客戶問卷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .form-container { max-width: 500px; margin: 10px auto; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* 針對 iOS 優化輸入框 */
        input[type="text"], input[type="tel"], input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
            background-color: #fff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            font-size: 16px; /* 防止 iOS 自動放大 */
            line-height: 1.5;
            color: #1f2937;
        }

        /* 專門修復 iPhone 日期選擇器顯示問題 */
        input[type="date"] {
            display: block;
            min-height: 48px;
            background-color: #ffffff !important;
        }

        /* 移除 iOS 預設的灰色背景和內陰影 */
        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background-color: #f9fafb;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .checkbox-item:active { background-color: #f3f4f6; }
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid #d1d5db;
            -webkit-appearance: none;
            appearance: none;
            position: relative;
            background: white;
        }
        input[type="checkbox"]:checked {
            background-color: #2563eb;
            border-color: #2563eb;
        }
        input[type="checkbox"]:checked::after {
            content: '✔';
            position: absolute;
            color: white;
            font-size: 14px;
            left: 3px;
            top: -1px;
        }
    </style>
</head>
<body class="p-4">
    <div class="form-container">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">AI EVENT 客戶問卷</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">客戶公司</label>
                <input type="text" id="c_company" placeholder="輸入公司名稱">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">客戶名稱</label>
                <input type="text" id="c_name" placeholder="輸入您的姓名">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">聯絡電話</label>
                <input type="tel" id="c_phone" placeholder="輸入聯絡電話">
            </div>

            <div>
                <p class="text-sm font-bold text-gray-700 mb-2">對什麼有興趣 (多選):</p>
                <div id="interestsGroup">
                    <label class="checkbox-item">
                        <input type="checkbox" name="int" value="AI prompt 指令" class="mr-3">
                        <span class="text-gray-700">AI prompt 指令</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="int" value="AI 剪片" class="mr-3">
                        <span class="text-gray-700">AI 剪片</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="int" value="AI AGENT" class="mr-3">
                        <span class="text-gray-700">AI AGENT</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="int" value="AI 文件管理" class="mr-3">
                        <span class="text-gray-700">AI 文件管理</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="int" value="AI 工作流程管理" class="mr-3">
                        <span class="text-gray-700">AI 工作流程管理</span>
                    </label>
                </div>
            </div>

            <div>
                <p class="text-sm font-bold text-gray-700 mb-1">想約 DEMO 日期:</p>
                <input type="date" id="c_date">
            </div>

            <button id="mainBtn" onclick="doSubmit()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform mt-4">
                確認提交
            </button>
        </div>
        <p id="msg" class="mt-4 text-center text-red-600 font-bold text-sm"></p>
    </div>

    <script>
        const S_URL = 'https://hazxfinkokifujqlmkcs.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhenhmaW5rb2tpZnVqcWxta2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ2MzcsImV4cCI6MjA5MjM2MDYzN30.y3njujhhcoZW5WTirqkGvWbv962e4F2whVVP0VeQ6ic';
        
        let sb;
        try {
            sb = window.supabase.createClient(S_URL, S_KEY);
        } catch(e) {
            console.error("SDK Error:", e);
        }

        async function doSubmit() {
            const btn = document.getElementById('mainBtn');
            const msg = document.getElementById('msg');
            
            const company = document.getElementById('c_company').value;
            const name = document.getElementById('c_name').value;
            const phone = document.getElementById('c_phone').value;
            const date = document.getElementById('c_date').value;
            const ints = Array.from(document.querySelectorAll('input[name="int"]:checked')).map(el => el.value);

            if(!company || !name || !phone || !date) {
                alert("請填寫完整資料！");
                return;
            }

            btn.disabled = true;
            btn.innerText = "提交中...";

            try {
                const { error } = await sb.from('customer_demands').insert([{
                    company_name: company,
                    customer_name: name,
                    phone_number: phone,
                    interests: ints,
                    demo_date: date
                }]);

                if(error) throw error;

                alert("✅ 提交成功！");
                window.location.reload();
            } catch(e) {
                alert("❌ 提交失敗: " + e.message);
                btn.disabled = false;
                btn.innerText = "確認提交";
            }
        }
    </script>
</body>
</html>
