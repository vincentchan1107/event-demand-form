<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - 客戶資料名單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; }
        .admin-container { max-width: 1200px; margin: 20px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f3f4f6; font-weight: 600; color: #374151; }
        tr:hover { background-color: #f9fafb; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; margin: 2px; background-color: #dbeafe; color: #1e40af; }
    </style>
</head>
<body class="p-4">
    <div class="admin-container">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <h1 class="text-2xl font-bold text-blue-600">已登記客戶名單</h1>
            <button onclick="loadData()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-bold">
                🔄 重新整理
            </button>
        </div>

        <div class="mb-4">
            <input type="text" id="searchBox" oninput="handleSearch()" placeholder="搜尋公司或客戶名稱..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="overflow-x-auto">
            <table>
                <thead>
                    <tr>
                        <th>客戶公司</th>
                        <th>客戶名稱</th>
                        <th>聯絡電話</th>
                        <th>興趣項目</th>
                        <th>DEMO 日期</th>
                        <th>登記時間</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="text-center py-8">載入中...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4 p-4 bg-gray-50 rounded-lg text-gray-600">
            目前共有 <span id="totalCount" class="font-bold text-blue-600 text-lg">0</span> 筆登記資料
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hazxfinkokifujqlmkcs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhenhmaW5rb2tpZnVqcWxta2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ2MzcsImV4cCI6MjA5MjM2MDYzN30.y3njujhhcoZW5WTirqkGvWbv962e4F2whVVP0VeQ6ic';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let allData = [];

        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">正在從資料庫抓取最新資料...</td></tr>';
            
            try {
                const { data, error } = await supabaseClient
                    .from('customer_demands')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allData = data;
                renderTable(allData);
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-500 font-bold">❌ 載入失敗: ${err.message}</td></tr>`;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('totalCount').innerText = data.length;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">目前尚無任何登記資料</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(row => `
                <tr>
                    <td class="font-bold text-gray-800">${row.company_name}</td>
                    <td>${row.customer_name}</td>
                    <td><a href="tel:${row.phone_number}" class="text-blue-600 underline">${row.phone_number}</a></td>
                    <td>${(row.interests || []).map(i => `<span class="badge">${i}</span>`).join('')}</td>
                    <td>${row.demo_date}</td>
                    <td class="text-xs text-gray-400">${new Date(row.created_at).toLocaleString('zh-Hant-HK')}</td>
                </tr>
            `).join('');
        }

        function handleSearch() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allData.filter(r => 
                (r.company_name && r.company_name.toLowerCase().includes(term)) || 
                (r.customer_name && r.customer_name.toLowerCase().includes(term))
            );
            renderTable(filtered);
        }

        // 頁面加載時自動讀取資料
        window.onload = loadData;
    </script>
</body>
</html>
