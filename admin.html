<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - 客戶資料管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; }
        .admin-container { max-width: 1200px; margin: 20px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f3f4f6; font-weight: 600; color: #374151; }
        tr:hover { background-color: #f9fafb; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; margin: 2px; background-color: #dbeafe; color: #1e40af; }
    </style>
</head>
<body class="p-4">
    <!-- 登入界面 -->
    <div id="loginContainer" class="admin-container max-w-md mt-20">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Admin 登入</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">管理員密碼</label>
                <input type="password" id="adminPassword" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入密碼 (預設: admin123)">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                登入
            </button>
            <p id="loginMessage" class="mt-4 text-center text-sm text-red-600 hidden"></p>
        </div>
    </div>

    <!-- 資料管理界面 -->
    <div id="dataContainer" class="hidden">
        <div class="admin-container">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h1 class="text-2xl font-bold text-blue-600">客戶資料管理</h1>
                <div class="flex gap-2">
                    <button onclick="loadData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">重新整理</button>
                    <button onclick="handleLogout()" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition">登出</button>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="searchBox" oninput="handleSearch()" placeholder="搜尋公司或客戶名稱..." class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>客戶公司</th>
                            <th>客戶名稱</th>
                            <th>聯絡電話</th>
                            <th>興趣項目</th>
                            <th>DEMO 日期</th>
                            <th>登記時間</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" class="text-center py-8">請先登入...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-4 text-sm text-gray-600">總計: <span id="totalCount" class="font-bold">0</span> 筆資料</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hazxfinkokifujqlmkcs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhenhmaW5rb2tpZnVqcWxta2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ2MzcsImV4cCI6MjA5MjM2MDYzN30.y3njujhhcoZW5WTirqkGvWbv962e4F2whVVP0VeQ6ic';
        const CORRECT_PASSWORD = 'admin123';
        
        let supabaseClient = null;
        let allData = [];

        function initSupabase() {
            if (!supabaseClient) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        }

        function handleLogin() {
            const pwd = document.getElementById('adminPassword').value;
            const msg = document.getElementById('loginMessage');
            
            if (pwd === CORRECT_PASSWORD) {
                localStorage.setItem('isAuth', 'true');
                showDashboard();
            } else {
                msg.innerText = '密碼錯誤！';
                msg.classList.remove('hidden');
            }
        }

        function handleLogout() {
            localStorage.removeItem('isAuth');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('dataContainer').classList.remove('hidden');
            initSupabase();
            loadData();
        }

        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">載入中...</td></tr>';
            
            try {
                const { data, error } = await supabaseClient
                    .from('customer_demands')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allData = data;
                renderTable(allData);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-500">錯誤: ${err.message}</td></tr>`;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('totalCount').innerText = data.length;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">暫無資料</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(row => `
                <tr>
                    <td class="font-bold">${row.company_name}</td>
                    <td>${row.customer_name}</td>
                    <td>${row.phone_number}</td>
                    <td>${(row.interests || []).map(i => `<span class="badge">${i}</span>`).join('')}</td>
                    <td>${row.demo_date}</td>
                    <td class="text-xs text-gray-400">${new Date(row.created_at).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function handleSearch() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allData.filter(r => 
                r.company_name.toLowerCase().includes(term) || 
                r.customer_name.toLowerCase().includes(term)
            );
            renderTable(filtered);
        }

        // 頁面加載檢查
        window.onload = () => {
            if (localStorage.getItem('isAuth') === 'true') {
                showDashboard();
            }
        };
    </script>
</body>
</html>
